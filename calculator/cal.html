<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cal.css">
    <script src="cal.js"></script>
    <title>Calculator</title>
</head>
<body onload="clearScreen()">
    <div class="box">
        <div class="square" style="--i:0;"></div>
        <div class="square" style="--i:1;"></div>
        <div class="square" style="--i:2;"></div>
        <div class="square" style="--i:3;"></div>
        <div class="square" style="--i:4;"></div>
        <div class="square" style="--i:5;"></div>
        <div class="cal">
            <form name="cal">
                <input type="text" name="screen" readonly>
            </form>
            <div class="allBtns">
                <div class="clear" onclick="clearScreen()">C</div>
                <div onclick="addOperator('/')">/</div>
                <div onclick="addOperator('*')">x</div>
                <div onclick="updateScreen('7')">7</div>
                <div onclick="updateScreen('8')">8</div>
                <div onclick="updateScreen('9')">9</div>
                <div onclick="addOperator('-')">-</div>
                <div onclick="updateScreen('4')">4</div>
                <div onclick="updateScreen('5')">5</div>
                <div onclick="updateScreen('6')">6</div>
                <div class="plus" onclick="addOperator('+')">+</div>
                <div onclick="updateScreen('1')">1</div>
                <div onclick="updateScreen('2')">2</div>
                <div onclick="updateScreen('3')">3</div>
                <div onclick="updateScreen('0')">0</div>
                <div onclick="updateScreen('00')">00</div>
                <div onclick="updateScreen('.')">.</div>
                <div onclick="evaluateExpression()" class="equal">=</div>
            </div>
        </div>
    </div>
    <script src="vanilla-tilt.js"></script>
    <script>
        VanillaTilt.init(document.querySelector(".cal"), {
            max: 23,
            speed: 800
        });
    </script>
</body>
</html>
